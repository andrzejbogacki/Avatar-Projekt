<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oscylator Rdzenia Kwantowego v19.4 | MASTER</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #020202; color: white; font-family: sans-serif; }
        canvas { display: block; position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        
        #start-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; }
        #init-btn { padding: 20px 40px; border: 2px solid gold; background: none; color: gold; font-weight: bold; border-radius: 50px; cursor: pointer; text-transform: uppercase; }

        #dashboard { display: none; width: 100%; max-width: 500px; pointer-events: auto; }
        .panel { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .section-title { font-size: 10px; color: gold; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .btn:active { background: gold; color: #000; }
        .btn b { display: block; font-size: 13px; }
        .btn small { font-size: 9px; color: #888; display: block; }

        .control-group { margin-top: 10px; }
        .control-group label { display: block; font-size: 10px; color: #aaa; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: gold; }

        #toggle-menu { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: gold; color: #000; border: none; font-weight: bold; font-size: 10px; z-index: 50; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="init-btn">Inicjuj System Avatar</button>
    </div>

    <button id="toggle-menu" onclick="toggleDashboard()">MENU</button>

    <div id="ui-layer">
        <div id="dashboard">
            <div class="panel">
                <div class="section-title">Zarządzanie Syntezą (Delay)</div>
                <div class="control-group">
                    <label>Czas Echa (Delay Time)</label>
                    <input type="range" min="0" max="1" step="0.01" value="0.3" oninput="updateSynth('delay', this.value)">
                </div>
                <div class="control-group">
                    <label>Sprzężenie (Feedback)</label>
                    <input type="range" min="0" max="0.9" step="0.01" value="0.4" oninput="updateSynth('feedback', this.value)">
                </div>
            </div>

            <div class="panel">
                <div class="section-title">Duch: Solfeggio</div>
                <div class="grid">
                    <button class="btn" onclick="activate(528, 'gold', 'Naprawa DNA')"><b>528 Hz</b><small>Transformacja Matrycy</small></button>
                    <button class="btn" onclick="activate(963, 'violet', 'Jedność')"><b>963 Hz</b><small>Połączenie ze Źródłem</small></button>
                    <button class="btn" onclick="activate(417, 'orange', 'Zmiana')"><b>417 Hz</b><small>Odwracanie Zdarzeń</small></button>
                    <button class="btn" onclick="activate(741, 'cyan', 'Intuicja')"><b>741 Hz</b><small>Oczyszczanie Pola</small></button>
                </div>
            </div>

            <div class="panel">
                <div class="section-title">Materia: Planety</div>
                <div class="grid">
                    <button class="btn" onclick="activate(136.1, '#00ffcc', 'Ziemia OM')"><b>Ziemia</b><small>136.1 Hz - Spokój</small></button>
                    <button class="btn" onclick="activate(221.23, '#ff69b4', 'Wenus')"><b>Wenus</b><small>221.2 Hz - Piękno</small></button>
                    <button class="btn" onclick="activate(141.27, '#aaa', 'Merkury')"><b>Merkury</b><small>141.3 Hz - Logika</small></button>
                    <button class="btn" onclick="activate(183.58, '#ffcc00', 'Jowisz')"><b>Jowisz</b><small>183.6 Hz - Ekspansja</small></button>
                    <button class="btn" onclick="activate(147.85, '#555', 'Saturn')"><b>Saturn</b><small>147.9 Hz - Struktura</small></button>
                    <button class="btn" onclick="activate(126.22, 'yellow', 'Słońce')"><b>Słońce</b><small>126.2 Hz - Centrum</small></button>
                </div>
            </div>
            
            <button onclick="toggleDashboard()" style="width: 100%; padding: 10px; background: none; border: 1px solid gold; color: gold; border-radius: 10px;">Zamknij Panel i Obserwuj</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let audioCtx, osc, mainGain, delayNode, feedbackGain;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dashboard = document.getElementById('dashboard');

        let w, h, cx, cy, frame = 0;
        let targetFreq = 528, themeColor = 'gold';

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
            cx = w/2; cy = h/2;
        });
        window.dispatchEvent(new Event('resize'));

        document.getElementById('init-btn').onclick = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                osc = audioCtx.createOscillator();
                mainGain = audioCtx.createGain();
                delayNode = audioCtx.createDelay(2.0);
                feedbackGain = audioCtx.createGain();

                osc.connect(mainGain);
                mainGain.connect(audioCtx.destination);

                // Delay Chain
                mainGain.connect(delayNode);
                delayNode.connect(feedbackGain);
                feedbackGain.connect(delayNode);
                delayNode.connect(audioCtx.destination);

                // Initial Synth Settings
                delayNode.delayTime.value = 0.3;
                feedbackGain.gain.value = 0.4;
                mainGain.gain.setValueAtTime(0, audioCtx.currentTime);
                
                osc.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('toggle-menu').style.display = 'block';
            dashboard.style.display = 'block';
            activate(528, 'gold', 'Inicjacja');
        };

        function activate(f, color, label) {
            targetFreq = f; themeColor = color;
            if (mainGain) {
                mainGain.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1);
                osc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.2);
            }
        }

        function updateSynth(type, val) {
            if (!audioCtx) return;
            if (type === 'delay') delayNode.delayTime.setTargetAtTime(val, audioCtx.currentTime, 0.1);
            if (type === 'feedback') feedbackGain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.1);
        }

        function toggleDashboard() {
            dashboard.style.display = dashboard.style.display === 'none' ? 'block' : 'none';
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.2)';
            ctx.fillRect(0, 0, w, h);
            frame++;
            const pulse = Math.sin(frame * 0.04) * 0.5 + 0.5;
            const coreR = 20 + (pulse * 15);

            // FALA SKOMPONOWANA
            ctx.beginPath(); ctx.strokeStyle = themeColor; ctx.lineWidth = 2;
            for(let x=0; x<w; x++) {
                const wave = Math.sin(x * 0.02 + frame * 0.1) * (targetFreq / 20) * Math.sin(frame * 0.02);
                x === 0 ? ctx.moveTo(x, 120 + wave) : ctx.lineTo(x, 120 + wave);
            }
            ctx.stroke();

            // OŚ I TORUS
            const g = ctx.createLinearGradient(cx, 0, cx, h);
            g.addColorStop(0, '#00faff'); g.addColorStop(0.5, themeColor); g.addColorStop(1, '#ff4400');
            ctx.strokeStyle = g; ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

            for(let i=0; i<8; i++) {
                const angle = (i/8) * Math.PI * 2 + frame * 0.01;
                ctx.beginPath(); ctx.strokeStyle = `rgba(255,255,255,${0.05 + pulse * 0.05})`;
                ctx.ellipse(cx, cy, Math.abs(120 * Math.cos(angle)), 250, angle, 0, Math.PI*2);
                ctx.stroke();
            }

            // KROPLA RDZENIA
            const gl = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 4);
            gl.addColorStop(0, themeColor); gl.addColorStop(1, 'transparent');
            ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(cx, cy, coreR * 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, coreR, 0, Math.PI*2); ctx.fill();

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
